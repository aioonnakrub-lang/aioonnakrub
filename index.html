<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>การ์ดงานอุปสมบท</title>

<style>
  body {
    font-family: "Sarabun", sans-serif;
    background-color: #f7f6f2;
    color: #3e3e3e;
    margin: 0;
    padding: 0;
    text-align: center;
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
    background: #fff;
    border-radius: 14px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.06);
    overflow: hidden;
    padding-bottom: 40px;
  }

  img {
    width: 100%;
    height: auto;
  }

  h1 {
    margin-top: 20px;
    font-size: 28px;
    color: #8c6e3d;
  }

  h2 {
    margin-top: -5px;
    font-size: 22px;
  }

  .schedule {
    margin-top: 25px;
    line-height: 1.8;
  }

  a.map-link {
    display: inline-block;
    margin-top: 15px;
    background: #8c6e3d;
    color: #fff;
    padding: 10px 20px;
    border-radius: 8px;
    text-decoration: none;
  }

  .sub-image {
    width: 90%;
    margin-top: 25px;
    border-radius: 10px;
  }

  footer {
    margin-top: 30px;
    font-size: 14px;
    color: #777;
  }
</style>
</head>
<body>

<div class="container">

  <!-- ภาพการ์ดงานบวช -->
  <img src="[files.use.ai](https://files.use.ai/files/chat%2Ffiles%2Ff0fedd25-c6a7-4be3-bbc2-79e8f71bd486-1777547049306-0.png)">

  <h1>งานอุปสมบท</h1>
  <h2>สิบตำรวจตรี อนุชา กะตะศิลา</h2>

  <div class="schedule">
    <p><strong>วันอาทิตย์ที่ 3 พฤษภาคม 2569</strong></p>
    <p>
      เวลา 09:00 น. ปลงผมนาค<br>
      เวลา 12:00 น. ร่วมรับประทานอาหาร<br>
      เวลา 16:00 น. แห่นาคเข้าอุโบสถ
    </p>
    <a class="map-link" href="[maps.app.goo.gl](https://maps.app.goo.gl/Hn1ANAJQfLY3wHS38?g_st=ic)" target="_blank">ดูแผนที่สถานที่จัดงาน</a>
  </div>

  <!-- ภาพผู้ที่จะอุปสมบท (เต็มตัว) -->
  <img class="sub-image" src="[files.use.ai](https://files.use.ai/files/chat%2Ffiles%2Fc81bdb2b-f55e-4b13-a2e6-a203bead88e1-1777547167042-0.png)">

  <!-- QR code สำหรับร่วมทำบุญ -->
  <img class="sub-image" src="[files.use.ai](https://files.use.ai/files/chat%2Ffiles%2Facf7df4e-4331-4da2-8f86-63e2e2bddac2-1777547242544-0.png)">

  <footer>
    ขอกราบอนุโมทนาบุญทุกท่านที่ร่วมในพิธีครั้งนี้
  </footer>
</div>

</body>
</html>
